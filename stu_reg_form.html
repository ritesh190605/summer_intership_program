<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form>
        <label>First Name:</label><br>
        <input type="text" name="firstname" placeholder="Enter first name "><br>

        <label>Last Name:</label><br>
        <input type="text" name="lastname" placeholder="Enter last time"><br>

        <label>Roll No:</label><br>
        <input type="text" name="rollno" placeholder="Enter roll no."><br>

        <label>Mobile No:</label><br>
        <input type="tel" name="mobile" placeholder="Enter mobile no."><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30" placeholder="Enter address"></textarea><br>

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter email"><br>

        <label>Password:</label><br>
        <input type="password" name="password" placeholder="Enter password"><br>

        <label>Date Of Birth</label><br>
        <input type=date name="DOB" placeholder="Enter Date of birth"><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>

</body>
</html>
