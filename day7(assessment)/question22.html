<!-- Create a CSS animation that continuously rotates a square using @keyframes. -->


<!DOCTYPE html>
<html>
<head>
    <title>Rotating Square</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: bisque;
        }

        .square {
            width: 100px;
            height: 100px;
            background-color: blue;
            animation: rotateSquare 2s linear infinite;
        }

        @keyframes rotateSquare {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="square"></div>

</body>
</html>
