<!-- Write HTML & CSS to create a login page centered both vertically and horizontally. -->


<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: lightgray;
        }

        .login {
            width: 300px;
            padding: 20px;
            background-color: white;
            border: 1px solid black;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 8px;
        }
    </style>
</head>
<body>

<div class="login">
    <h2>Login</h2>

    <input type="text" placeholder="Username">

    <input type="password" placeholder="Password">

    <button>Login</button>
</div>

</body>
</html>
