<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Student Registration Form</title>
</head>
<body>

    <h1 id="heading"> BBD STUDENT REGISTRATION FORM</h1>
    <div class="form">

    

    <form>
        <label for="firstname">First Name:</label><br>
        <input id="firstname" type="text" name="firstname" placeholder="Enter first name "><br>

        <label>Last Name:</label><br>
        <input id="lastname" type="text" name="lastname" placeholder="Enter last time"><br>

        <label>Roll No:</label><br>
        <input id="rollno"type="text" name="rollno" placeholder="Enter roll no."><br>

        <label>Mobile No:</label><br>
        <input type="tel" name="mobile" placeholder="Enter mobile no."><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30" placeholder="Enter address"></textarea><br>

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter email"><br>

        <label>Password:</label><br>
        <input type="password" name="password" placeholder="Enter password"><br>

        <label>Date Of Birth</label><br>
        <input type=date name="DOB" placeholder="Enter Date of birth"><br>

        <button id="submit" type="submit">Submit</button>
         <button id="reset" type="reset"> Reset</button>
        
    </form>
</div>

</body>
</html>
