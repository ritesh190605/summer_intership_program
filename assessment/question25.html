<!-- Create a portfolio hero section containing a profile image, heading, description, and Call-To-Action button using Flexbox. -->


<!DOCTYPE html>
<html>
<head>
    <title>Colorful Portfolio Hero</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd);
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: 100vh;
            padding: 20px;
        }

        .text {
            max-width: 450px;
            color: #222;
        }

        .text h1 {
            font-size: 45px;
            color: #2b2d42;
        }

        .text p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #c9184a;
            transform: scale(1.05);
        }

        .image img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="hero">

    <div class="text">
        <h1>Hi, I'm Web Dev</h1>
        <p>I love building creative and colorful websites using HTML, CSS, and JavaScript.</p>
        <button class="btn">Hire Me</button>
    </div>

    <div class="image">
        <img src="61570c4ea6a07d23a9ecc24dbff9c606.jpg" alt="Profile Image">
    </div>

</div>

</body>
</html>
