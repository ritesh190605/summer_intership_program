<!-- Write HTML & CSS to create a pricing card with hover effects -->



<!DOCTYPE html>
<html>
<head>
    <title>Pricing Cards</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin-top: 30px;
        }

        .container {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 80vh;
        }

        .card {
            width: 250px;
            background: white;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background-color: #dff6ff;
        }

        .price {
            font-size: 24px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: blue;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

<h1>Pricing Plans</h1>

<div class="container">

    <div class="card">
        <h2>Basic</h2>
        <div class="price">$9/month</div>
        <p>✔ 10 GB Storage</p>
        <p>✔ Email Support</p>
        <p>✔ 1 User</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>Pro</h2>
        <div class="price">$39/month</div>
        <p>✔ 50 GB Storage</p>
        <p>✔ Priority Support</p>
        <p>✔ 5 Users</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <h2>Business</h2>
        <div class="price">$69/month</div>
        <p>✔ 200 GB Storage</p>
        <p>✔ 24/7 Support</p>
        <p>✔ Unlimited Users</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
